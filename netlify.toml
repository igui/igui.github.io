# Netlify Configuration for Ignacio Avas Portfolio
# This file configures build settings, redirects, and headers for Netlify deployment

[build]
  # Build command - uses pnpm via corepack
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm build"

  # Directory to deploy (Vite outputs to dist/public/)
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "22"

# Redirect all non-file requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security and performance headers
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "SAMEORIGIN"
    
    # Enable XSS protection
    X-XSS-Protection = "1; mode=block"
    
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Permissions policy
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Cache control for static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache control for HTML files (no cache to ensure fresh content)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Environment variables (if needed in future)
# [context.production.environment]
#   NODE_ENV = "production"
